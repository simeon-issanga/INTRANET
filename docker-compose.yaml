services:
  next-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs_standalone
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    depends_on:
      - bdd
    networks:
      - intranet

  bdd:
    image: postgres:16-alpine
    container_name: bdd-intranet
    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_USER: postgres
      POSTGRES_DB: intranet_db
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - intranet

  adminer:
    image: adminer
    container_name: adminer-intranet
    restart: always
    ports:
      - 8080:8080
    depends_on:
      - bdd
    networks:
      - intranet

volumes:
  db_data: {}

networks:
  intranet: {}
